<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="windows-1251">
    <title>Коло балансу життя</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tahoma:wght@400;700&display=swap');

        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(to bottom, #0a246a, #a0c4ff);
            margin: 0;
            padding: 20px 0;
            height: 100vh;
            overflow: auto;
        }

        .window {
            width: 820px;
            max-width: 95%;
            margin: 10px auto;
            background: #c0c0c0;
            border: 2px solid #dfdfdf;
            border-top-color: #fff;
            border-left-color: #fff;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.5);
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-buttons {
            display: flex;
            gap: 4px;
        }

        .btn-xp {
            width: 22px;
            height: 20px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-bottom-color: #808080;
            border-right-color: #808080;
            text-align: center;
            font-size: 14px;
            line-height: 16px;
            cursor: pointer;
        }

        .content {
            padding: 20px;
            background: #c0c0c0;
        }

        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 22px;
            color: #000080;
        }

        label {
            display: block;
            margin: 18px 0 6px;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .value {
            float: right;
            font-weight: bold;
            color: #000080;
            width: 30px;
            text-align: right;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(#f0f0f0, #c0c0c0);
            border: 2px solid #fff;
            border-bottom-color: #808080;
            border-right-color: #808080;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
        }

        button:active {
            border-top-color: #808080;
            border-left-color: #808080;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <span>Коло балансу життя — Windows XP Edition</span>
            <div class="title-bar-buttons">
                <div class="btn-xp" onclick="window.location.href='help.html'">?</div>
                <div class="btn-xp" onclick="window.location.href='help.html'">?</div>
                <div class="btn-xp" onclick="window.location.href='help.html'">?</div>
            </div>
        </div>

        <div class="content">
            <h1>Оцініть своє життя за 9 сферами</h1>

            <form id="balanceForm">
                <label>Карьєра <span class="value" id="val1">0</span></label>
                <input type="range" min="0" max="10" value="0" id="career">

                <label>Фінанси <span class="value" id="val2">0</span></label>
                <input type="range" min="0" max="10" value="0" id="finances">

                <label>Сім'я <span class="value" id="val3">0</span></label>
                <input type="range" min="0" max="10" value="0" id="family">

                <label>Навколишнє середовище <span class="value" id="val4">0</span></label>
                <input type="range" min="0" max="10" value="0" id="environment">

                <label>Саморозвиток <span class="value" id="val5">0</span></label>
                <input type="range" min="0" max="10" value="0" id="selfdev">

                <label>Нові навички / Подорожі <span class="value" id="val6">0</span></label>
                <input type="range" min="0" max="10" value="0" id="skills">

                <label>Відпочинок <span class="value" id="val7">0</span></label>
                <input type="range" min="0" max="10" value="0" id="rest">

                <label>Здоров'я та спорт <span class="value" id="val8">0</span></label>
                <input type="range" min="0" max="10" value="0" id="health">

                <label>Розваги <span class="value" id="val9">0</span></label>
                <input type="range" min="0" max="10" value="0" id="entertainment">

                <button type="button" onclick="calculateAndRedirect()">
                    Порахувати мій баланс >
                </button>
            </form>
        </div>
    </div>

    <script>
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            const number = slider.id.replace(/\D/g,'');
            const valueSpan = document.getElementById('val' + number);
            
            slider.addEventListener('input', function() {
                valueSpan.textContent = this.value;
            });
        });

        function calculateAndRedirect() {
            const values = {
                career: parseInt(document.getElementById('career').value),
                finances: parseInt(document.getElementById('finances').value),
                family: parseInt(document.getElementById('family').value),
                environment: parseInt(document.getElementById('environment').value),
                selfdev: parseInt(document.getElementById('selfdev').value),
                skills: parseInt(document.getElementById('skills').value),
                rest: parseInt(document.getElementById('rest').value),
                health: parseInt(document.getElementById('health').value),
                entertainment: parseInt(document.getElementById('entertainment').value)
            };

            localStorage.setItem('userBalance', JSON.stringify(values));
            window.location.href = 'results.html';
        }
    </script>
</body>
</html>
